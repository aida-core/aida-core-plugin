---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege at the workflow level (#53). Individual jobs
# escalate explicitly if they need more (none do today). Dependabot
# keeps the action SHAs below up-to-date — when a pinned action
# releases a new version, dependabot opens a PR with the new SHA +
# version comment.
permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m venv ~/.aida/venv
          make install

      - name: Run unit tests
        run: make test TEST_ARGS="tests/unit/ tests/test_hooks.py"

      - name: Validate plugin structure
        run: |
          test -f .claude-plugin/plugin.json
          test -f skills/aida/SKILL.md
          echo "Plugin structure valid"

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv ~/.aida/venv
          make install

      - name: Run bootstrap integration tests
        run: make test TEST_ARGS="tests/integration/test_bootstrap_install.py"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Install linters
        run: |
          python -m venv ~/.aida/venv
          make install
          npm install -g markdownlint-cli@0.43.0

      - name: Run all linters
        run: make lint

      # pip-audit gates on known CVEs in our Python deps (#53).
      # --strict fails on any vulnerability, including dev-only deps.
      # Runs after install so it audits the actual pinned tree, not
      # the requirements files in isolation.
      #
      # The venv's bundled pip is upgraded first because pip itself
      # is in the audited dependency tree — CI runners ship pip 24.0
      # which has known CVEs that newer versions resolve. Upgrading
      # pip is a no-op for our runtime/dev deps; we don't pin it.
      - name: Audit Python dependencies for known CVEs
        run: |
          ~/.aida/venv/bin/pip install --quiet --upgrade pip
          ~/.aida/venv/bin/pip install --quiet pip-audit
          ~/.aida/venv/bin/pip-audit --strict

  check-attribution:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Block AI co-authorship trailers
        run: |
          MERGE_BASE=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          PATTERN='^Co-Authored-By:.*\b(claude|anthropic|openai|chatgpt|copilot|gemini|ai\b)'
          if git log "$MERGE_BASE..HEAD" --format='%B' | grep -iE "$PATTERN"; then
            msg="Found AI co-authorship attribution. Remove Co-Authored-By"
            msg="$msg trailers referencing AI tools (claude, anthropic, etc.)."
            echo "::error::${msg}"
            exit 1
          fi
          echo "No AI attribution found — clean."
